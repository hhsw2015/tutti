name: Tutti
options:
  bundleIdPrefix: com.recents
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: false

targets:
  Tutti:
    type: application
    platform: macOS
    sources:
      - path: Tutti
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    info:
      path: Tutti/Info.plist
      properties:
        CFBundleName: Tutti
        CFBundleDisplayName: Tutti
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: YES
        NSHumanReadableCopyright: ""
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.recents.tutti
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Tutti Local"
      DEVELOPMENT_TEAM: ""
      ENABLE_HARDENED_RUNTIME: NO
