name: Build Tutti.app

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          ls /Applications | grep -i '^Xcode' || true
          sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || echo /Applications/Xcode.app)"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build (ad-hoc signed Release)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme Tutti \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build

      - name: Re-sign deeply (ad-hoc) + strip quarantine + zip
        run: |
          APP="build/Build/Products/Release/Tutti.app"
          test -d "$APP"
          xattr -cr "$APP" || true
          # ad-hoc sign every nested binary, framework, xpc, helper
          find "$APP" -type f \( -perm -u+x -o -name '*.dylib' -o -name '*.framework' \) -print0 \
            | xargs -0 -I{} codesign --force --sign - --timestamp=none --options=runtime "{}" 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none --options=runtime "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP" || true
          ditto -c -k --sequesterRsrc --keepParent "$APP" Tutti.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tutti-app-unsigned
          path: Tutti.app.zip
          if-no-files-found: error

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Tutti.app.zip
          generate_release_notes: true
