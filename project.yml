name: Tutti
options:
  bundleIdPrefix: com.recents
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: false

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  Tutti:
    type: application
    platform: macOS
    sources:
      - path: Tutti
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    info:
      path: Tutti/Info.plist
      properties:
        CFBundleName: Tutti
        CFBundleDisplayName: Tutti
        CFBundleShortVersionString: "0.2.4"
        CFBundleVersion: "6"
        LSUIElement: YES
        NSHumanReadableCopyright: ""
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleAllowMixedLocalizations: YES
        CFBundleLocalizations:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
          - fr
          - de
          - it
          - es
        SUFeedURL: "https://barrybarrywu.github.io/tutti/appcast.xml"
        SUPublicEDKey: "qp6joWAdv6afi4P/Ux8rhTzAsQup8fPuVz9Bj2Y1SmQ="
        SUEnableInstallerLauncherService: NO
    dependencies:
      - package: Sparkle
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.recents.tutti
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application: BaoLin Wu (RFW398ARA9)"
      DEVELOPMENT_TEAM: RFW398ARA9
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: Tutti/Tutti.entitlements
      OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
    scheme:
      gatherCoverageData: false
    # TuttiTests target removed from spec — test sources live locally only
    # (gitignored). Re-add a local test target via xcodegen overlay if needed.

