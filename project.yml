name: Tutti
options:
  bundleIdPrefix: com.recents
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: false

targets:
  Tutti:
    type: application
    platform: macOS
    sources:
      - path: Tutti
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    info:
      path: Tutti/Info.plist
      properties:
        CFBundleName: Tutti
        CFBundleDisplayName: Tutti
        CFBundleShortVersionString: "0.2.1"
        CFBundleVersion: "3"
        LSUIElement: YES
        NSHumanReadableCopyright: ""
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleAllowMixedLocalizations: YES
        CFBundleLocalizations:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
          - fr
          - de
          - it
          - es
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.recents.tutti
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application: BaoLin Wu (RFW398ARA9)"
      DEVELOPMENT_TEAM: RFW398ARA9
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: Tutti/Tutti.entitlements
      OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
    scheme:
      testTargets:
        - TuttiTests
      gatherCoverageData: false

  TuttiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TuttiTests
    dependencies:
      - target: Tutti
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.recents.tutti.tests
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      GENERATE_INFOPLIST_FILE: YES
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tutti.app/Contents/MacOS/Tutti"
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application: BaoLin Wu (RFW398ARA9)"
      DEVELOPMENT_TEAM: RFW398ARA9
