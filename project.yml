name: Tutti
options:
  bundleIdPrefix: com.recents
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: false

targets:
  Tutti:
    type: application
    platform: macOS
    sources:
      - path: Tutti
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    info:
      path: Tutti/Info.plist
      properties:
        CFBundleName: Tutti
        CFBundleDisplayName: Tutti
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: YES
        NSHumanReadableCopyright: ""
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.recents.tutti
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application: BaoLin Wu (RFW398ARA9)"
      DEVELOPMENT_TEAM: RFW398ARA9
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: Tutti/Tutti.entitlements
      OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
